name: Controleer app

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run automation:validate
      - run: npm run automation:test
      - run: npm run data:generate
      - run: npm run data:validate
      - run: npm run data:check-build-profiles
      - run: npm run lint
      - run: npm test
      - run: npm run build -- --mode pages
